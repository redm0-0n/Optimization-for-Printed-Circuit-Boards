version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-pcb_user}
      POSTGRES_PASSWORD: ${DB_PASS:-pcb_secret_2024}
      POSTGRES_DB: ${DB_NAME:-pcb_optimizer}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pcb_user} -d ${DB_NAME:-pcb_optimizer}"]
      interval: 4s
      timeout: 4s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pcb_user}:${DB_PASS:-pcb_secret_2024}@db:5432/${DB_NAME:-pcb_optimizer}
      PYTHONPATH: /app
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: